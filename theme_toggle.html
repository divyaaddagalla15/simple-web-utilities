<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --bg: #ffffff; --text: #000000; }
        .dark-theme { --bg: #222222; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); transition: 0.5s; text-align: center; padding-top: 50px; font-family: sans-serif; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #3498db; color: white; }
    </style>
</head>
<body>
    <h1>Theme Switcher</h1>
    <p>Click the button to change the appearance.</p>
    <button onclick="toggleTheme()">Switch Theme</button>

    <script>
        function toggleTheme() {
            document.body.classList.toggle("dark-theme");
        }
    </script>
</body>
</html>
